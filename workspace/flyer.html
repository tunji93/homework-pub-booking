<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Event Flyer</title>
    <style>
        body { font-family: sans-serif; margin: 20px; color: #333; }
        .card { border: 1px solid #ccc; padding: 20px; border-radius: 8px; max-width: 500px; }
        h1 { color: #1a5f7a; margin-top: 0; }
        .section { margin-bottom: 15px; }
        .label { font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h1 data-testid="venue_name">Haymarket Tap</h1>
        
        <div class="section">
            <p><span class="label">Address:</span> <span data-testid="venue_address">12 Dalry Rd, Edinburgh EH11 2BG</span></p>
            <p><span class="label">Date:</span> <span data-testid="date">2026-04-25</span></p>
            <p><span class="label">Time:</span> <span data-testid="time">19:30</span></p>
            <p><span class="label">Party Size:</span> <span data-testid="party_size">6</span></p>
        </div>

        <hr>

        <div class="section">
            <h3>Weather Outlook</h3>
            <p><span class="label">Condition:</span> <span data-testid="condition">cloudy</span></p>
            <p><span class="label">Temperature:</span> <span data-testid="temperature_c">12°C</span></p>
        </div>

        <hr>

        <div class="section">
            <h3>Cost Breakdown</h3>
            <p><span class="label">Total Cost:</span> <span data-testid="total_gbp">£540</span></p>
            <p><span class="label">Deposit Required:</span> <span data-testid="deposit_required_gbp">£0</span></p>
        </div>
    </div>
</body>
</html>
